{{define "login"}}
<section class="auth-wrap">
    <div class="card auth-card">
        <p class="eyebrow">Admin Access</p>
        <h1>Sign in to manage the league</h1>
        <p class="muted">Use the exact admin email you registered with. If you have not created an admin account yet, register first.</p>

        <form class="stack" method="post" action="/login">
            <label>
                <span>Admin email</span>
                <input type="email" name="email" placeholder="name@example.com" required>
            </label>
            <label>
                <span>Password</span>
                <input type="password" name="password" placeholder="Your password" required>
            </label>
            <button class="button" type="submit">Login</button>
        </form>

        <div class="credentials">
            <p><strong>Need access?</strong> <a href="/register">Register an admin email here</a>.</p>
        </div>
    </div>
</section>
{{end}}
